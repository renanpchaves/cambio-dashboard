<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cambio Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <h1>Cambio Dashboard</h1>
            <section class="card">
            <h2>Cotação USD → BRL</h2>

            <div class="info-grid">
            <p><strong>Nome:</strong><span id="name"> -- </span></p>
            <p><strong>Compra:</strong><span id="bid"> -- </span></p>
            <p><strong>Venda:</strong><span id="ask"> -- </span></p>
            <p><strong>Máxima:</strong><span id="high"> -- </span></p>
            <p><strong>Mínima:</strong><span id="low"> -- </span></p>
            <p><strong>Variação:</strong><span id="pctChange"> -- </span></p>
            <p><strong>Atualizado em::</strong><span id="create_date"> -- </span></p>
            </div>

            <button id="refreshButton">Atualizar cotação</button>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
